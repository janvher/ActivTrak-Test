name: activtrack-test-backend

services:
  postgres:
    image: postgres:16-alpine
    container_name: activtrack-test-backend
    environment:
      POSTGRES_USER: activtrak
      POSTGRES_PASSWORD: activtrak
      POSTGRES_DB: activtrak
    ports:
      - "5432:5432"
    volumes:
      - activtrak_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U activtrak -d activtrak"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  activtrak_pgdata:
