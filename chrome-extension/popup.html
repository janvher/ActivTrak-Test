<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ActivTrak Tab Tracker</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 12px;
        width: 260px;
        color: #152033;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
      }
      p {
        margin: 4px 0;
        font-size: 12px;
        color: #5b6b7c;
      }
      button,
      input {
        width: 100%;
        margin-top: 8px;
        padding: 6px 8px;
        box-sizing: border-box;
      }
      .row {
        margin-top: 8px;
      }
      code {
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h1>ActivTrak Tab Tracker</h1>
    <p>Tracks <strong>active tab domain only</strong>. No history.</p>
    <p>Domain: <code id="domain">—</code></p>
    <p>Status: <strong id="status">…</strong></p>
    <button id="toggle" type="button">Pause</button>
    <div class="row">
      <label for="api">API URL</label>
      <input id="api" type="url" />
      <button id="saveApi" type="button">Save API</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
